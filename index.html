<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#ffffff" />
  <title>NEW TBGOLF – We’re Building Something New</title>
  <meta name="description" content="TBGOLF official website is under construction." />
  <meta property="og:title" content="TBGOLF – We’re Building Something New" />
  <meta property="og:description" content="Our website is under construction. Stay tuned!" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="/tbgolf_s.png" />
  <link rel="icon" href="/tbgolf_s.png" />
  <style>
    :root{
      --bg: #ffffff;
      --fg: #0f172a;
      --muted: #475569;
      --accent: #0284c7;
      --card: #ffffffee;
      --ring: #0284c744;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      background: var(--bg);
      color:var(--fg);
      display:grid; place-items:center;
      padding: 24px;
    }
    .wrap{
      width:min(1200px, 100%);
      display:grid; gap:60px;
      justify-items:center;
      text-align:center;
    }
    .card{
      width:100%;
      background: var(--card);
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      padding: clamp(30px, 6vw, 60px);
      box-shadow: 0 10px 20px #00000015;
    }
    .logo{
      display:inline-grid; place-items:center;
      margin-bottom: 60px;
    }
    .logo img{ width:100%; max-width: 1000px; height:auto; }

    h1{
      margin: 4px 0 0 0; font-size: clamp(28px, 6vw, 44px); line-height:1.1;
    }
    p.lead{ margin: 20px auto 0; max-width: 64ch; color:var(--muted); font-size: clamp(14px, 2.6vw, 18px); }

    .status{
      margin-top: 40px; display:inline-flex; align-items:center; gap:10px; padding:10px 14px; border-radius:999px;
      background: #e0f2fe; border: 1px solid #bae6fd; color:#0284c7; font-weight:600; font-size:14px;
    }
    .status .dot{ width:10px; height:10px; border-radius:50%; background:#22c55e; box-shadow:0 0 0 6px #22c55e22; animation: pulse 2s infinite; }
    @keyframes pulse{ 0%{ box-shadow:0 0 0 0 #22c55e55 } 70%{ box-shadow:0 0 0 12px transparent } 100%{ box-shadow:0 0 0 0 transparent } }

    .footer{
      display:flex; gap:20px; flex-wrap:wrap; justify-content:center; align-items:center; margin-top:40px; color:var(--muted);
      font-size:14px;
    }
    .footer a{ color: var(--fg); text-decoration:none; border-bottom: 1px dashed #cbd5e1; }
    .footer a:hover{ color: var(--accent); border-color: var(--accent); }

    .divider{ height:1px; width:100%; background: linear-gradient(90deg, transparent, #cbd5e1, transparent); margin: 20px 0; }

    .grid{
      display:grid; gap:20px; grid-template-columns: 1fr;
    }
    @media (min-width: 720px){
      .grid{ grid-template-columns: 1.2fr 1fr; align-items:center; }
      .hero-visual{ order:2; }
    }

    .hero-visual{
      border-radius:16px; overflow:hidden; border:1px solid #e2e8f0; background: linear-gradient(180deg, #e0f2fe, transparent);
      min-height: 240px; display:grid; place-items:center; padding: 16px;
    }
    .crane{ width: 100%; max-width: 520px; height:auto; opacity:.9 }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <header class="logo" aria-label="Company Identity">
        <img src="/tbgolf_s.png" alt="TBGOLF Logo" onerror="this.outerHTML='<span class=\'brand-text\'>TBGOLF</span>'" />
      </header>

      <div class="grid" role="region" aria-label="Under Construction">
        <div>
          <h1>We’re Building Something Great</h1>
          <p class="lead">Our new TBGOLF website is under construction. We’re crafting a faster and better experience for you. Please check back soon.</p>
          <div class="status" aria-live="polite">
            <span class="dot" aria-hidden="true"></span>
            Under Construction – Live Preview
          </div>
          <div class="divider" role="separator" aria-hidden="true"></div>
          <div class="footer">
            <span>&copy; <span id="year"></span> TBGOLF. All rights reserved.</span>
            <span>Contact: <a href="mailto:kmk@tbgolf.co.kr">kmk@tbgolf.co.kr</a></span>
          </div>
        </div>
        <figure class="hero-visual">
          <svg class="crane" viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Illustration: construction crane">
            <defs>
              <linearGradient id="g1" x1="0" x2="1">
                <stop offset="0%" stop-color="#38bdf8"/>
                <stop offset="100%" stop-color="#3b82f6"/>
              </linearGradient>
            </defs>
            <rect width="640" height="360" rx="16" fill="#f8fafc"/>
            <g opacity="0.25">
              <circle cx="520" cy="90" r="70" fill="url(#g1)"/>
              <circle cx="140" cy="300" r="110" fill="url(#g1)"/>
            </g>
            <g stroke="#9fb3c8" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
              <path d="M60 300h520"/>
              <path d="M140 300V140l120-40 120 40v160"/>
              <path d="M260 100V60h120l40 40"/>
              <path d="M380 60v60"/>
              <path d="M420 100h140"/>
              <rect x="520" y="100" width="36" height="24" fill="#38bdf8" stroke="#38bdf8" rx="4"/>
              <path d="M538 124v40"/>
              <rect x="522" y="164" width="32" height="28" fill="#f8fafc" stroke="#9fb3c8" rx="4"/>
              <path d="M260 140l120 40"/>
              <path d="M140 140l120 40"/>
            </g>
          </svg>
        </figure>
      </div>
    </section>
  </main>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
